        .profile-pic {

            align-items: center;

        .profile-info {

        .profile-name {

            padding: 0 20px;

        }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
            min-width: 80px;
        }
        
        .story-item:hover {
            transform: scale(1.05);
        }
        
        .story-circle {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: linear-gradient(45deg, #F56040, #FFAD46, #FFDD59);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            position: relative;
            padding: 3px;
        }
        
        .story-circle.active::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            background: linear-gradient(45deg, #F56040, #FFAD46, #FFDD59);
            z-index: -1;
        }
        
        .story-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .story-label {
            font-size: 12px;
            text-align: center;
            max-width: 66px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* View Toggle */

            background: white;
            padding: 10px 0;
            border-bottom: 1px solid #DBDBDB;
            text-align: center;
        }
        
        .view-toggle {
            display: inline-flex;
            border: 1px solid #DBDBDB;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .view-btn {
            padding: 8px 16px;
            background: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .view-btn.active {
            background: #262626;
            color: white;
        }

            min-height: calc(100vh - 400px);

            gap: 1px;
            background: #DBDBDB;
        }
        
        .products-grid.grid-view {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .products-grid.list-view {
            grid-template-columns: 1fr;
            gap: 20px;
            background: transparent;
            padding: 20px;
        }
        
        .product-item {
            background: white;
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
        }

            color: #8E8E8E;

        // Categories
        const categories = [
            { id: 'all', name: 'All', icon: '🏠' },
            { id: 'saunas', name: 'Saunas', icon: '🔥' },
            { id: 'cold-plunge', name: 'Cold Plunge', icon: '❄️' },
            { id: 'infrared', name: 'Infrared', icon: '🌡️' },
            { id: 'spa', name: 'Spa & Massage', icon: '💆' },
            { id: 'accessories', name: 'Accessories', icon: '🧴' },
            { id: 'recovery', name: 'Recovery', icon: '🏋️' },
            { id: 'best-sellers', name: 'Best Sellers', icon: '⭐' },
            { id: 'sale', name: 'Sale', icon: '🏷️' }
        ];

        // State
        let currentCategory = 'all';
        let currentView = 'grid';
        let wishlist = JSON.parse(localStorage.getItem('saunagram-wishlist') || '[]');
        let filteredProducts = [...products];

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            renderCategories();
            renderProducts();
            setupSearch();
            updateBottomNav();
        });

        // Categories
        function renderCategories() {
            const container = document.getElementById('categoriesContainer');
            container.innerHTML = categories.map(category => `
                <div class="story-item" onclick="setActiveCategory('${category.id}')">
                    <div class="story-circle ${currentCategory === category.id ? 'active' : ''}">
                        <div class="story-inner">
                            ${category.icon}
                        </div>
                    </div>
                    <div class="story-label">${category.name}</div>
                </div>
            `).join('');
        }

        function setActiveCategory(categoryId) {
            currentCategory = categoryId;
            filterProducts();
            renderCategories();
            updateBottomNav();
        }

        // Products
        function filterProducts() {
            let filtered = [...products];
            
            // Category filter
            if (currentCategory === 'best-sellers') {
                filtered = filtered.filter(p => p.price >= 1000);
            } else if (currentCategory === 'sale') {
                filtered = filtered.filter(p => p.originalPrice);
            } else if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }
            
            // Search filter
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(p => 
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.brand.toLowerCase().includes(searchTerm) ||
                    p.description.toLowerCase().includes(searchTerm)
                );
            }
            
            filteredProducts = filtered;
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const emptyState = document.getElementById('emptyState');
            
            if (filteredProducts.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }
            
            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            if (currentView === 'grid') {
                grid.innerHTML = filteredProducts.map(product => `
                    <div class="product-item fade-in" onclick="openProductModal(${product.id})">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                    </div>
                `).join('');
            } else {
                grid.innerHTML = filteredProducts.map(product => `
                    <div class="product-item fade-in">
                        <img src="${product.image}" alt="${product.name}" class="product-image" onclick="openProductModal(${product.id})">
                        <div class="product-content">
                            <div class="product-brand">${product.brand}</div>
                            <div class="product-title">${product.name}</div>
                            <div class="product-price">
                                $${product.price.toLocaleString()}
                                ${product.originalPrice ? `<span class="original">$${product.originalPrice.toLocaleString()}</span>` : ''}
                            </div>
                            <div class="product-actions">
                                <div class="product-icons">
                                    <button class="product-icon ${wishlist.includes(product.id) ? 'liked' : ''}" 
                                            onclick="toggleWishlist(${product.id})">♡</button>
                                    <button class="product-icon" onclick="shareProduct(${product.id})">⤴</button>
                                    <button class="product-icon" onclick="bookmarkProduct(${product.id})">⚑</button>
                                </div>
                                <button class="shop-now-btn" onclick="buyProduct(${product.id})">Shop Now →</button>
                            </div>
                            <div class="product-description">${product.description}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        // View switching
        function switchView(view) {
            currentView = view;
            const grid = document.getElementById('productsGrid');
            const gridBtn = document.getElementById('gridViewBtn');
            const listBtn = document.getElementById('listViewBtn');
            
            if (view === 'grid') {
                grid.className = 'products-grid grid-view';
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
            } else {
                grid.className = 'products-grid list-view';
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
            }
            
            renderProducts();
        }

        // Product Modal
        function openProductModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const modal = document.getElementById('productModal');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div class="modal-product-info">
                    <div class="modal-images">
                        <img src="${product.image}" alt="${product.name}" class="modal-image">
                    </div>
                    <div class="modal-details">
                        <div class="modal-brand">${product.brand}</div>
                        <h3>${product.name}</h3>
                        <div class="modal-price">
                            $${product.price.toLocaleString()}
                            ${product.originalPrice ? `<span class="original">$${product.originalPrice.toLocaleString()}</span>` : ''}
                        </div>
                        <p class="modal-description">${product.description}</p>
                        <div class="modal-features">
                            <h4>Key Features:</h4>
                            <ul>
                                ${product.features.map(feature => `<li>${feature}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="modal-actions">
                            <button class="buy-now-btn" onclick="buyProduct(${product.id})">Buy Now</button>
                            <button class="wishlist-btn ${wishlist.includes(product.id) ? 'liked' : ''}" 
                                    onclick="toggleWishlist(${product.id})">♡</button>
                        </div>
                    </div>
                </div>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('productModal');
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Wishlist
        function toggleWishlist(productId) {
            if (wishlist.includes(productId)) {
                wishlist = wishlist.filter(id => id !== productId);
            } else {
                wishlist.push(productId);
            }
            
            localStorage.setItem('saunagram-wishlist', JSON.stringify(wishlist));
            renderProducts();
            
            // Update modal if open
            const modal = document.getElementById('productModal');
            if (modal.classList.contains('active')) {
                const wishlistBtn = modal.querySelector('.wishlist-btn');
                if (wishlistBtn) {
                    wishlistBtn.classList.toggle('liked', wishlist.includes(productId));
                }
            }
        }

        function showWishlist() {
            const wishlistProducts = products.filter(p => wishlist.includes(p.id));
            filteredProducts = wishlistProducts;
            currentCategory = 'wishlist';
            renderProducts();
            renderCategories();
        }

        // Search
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', debounce(filterProducts, 300));
        }

        function focusSearch() {
            document.getElementById('searchInput').focus();
        }

        // Utility functions
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function scrollToProducts() {
            document.querySelector('.products-section').scrollIntoView({ behavior: 'smooth' });
        }

        function updateBottomNav() {
            const navItems = document.querySelectorAll('.bottom-nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            
            if (currentCategory === 'all') {
                navItems[0].classList.add('active');
            }
        }

        function shareProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (navigator.share && product) {
                navigator.share({
                    title: product.name,
                    text: product.description,
                    url: window.location.href
                });
            }
        }

        function bookmarkProduct(productId) {
            // Could implement actual bookmarking functionality
            console.log('Bookmark product:', productId);
        }

        function buyProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                // In a real implementation, this would redirect to checkout or affiliate link
                window.open(product.affiliateUrl, '_blank');
            }
        }

        function showCategories() {
            // Mobile category selector could be implemented here
            console.log('Show categories');
        }

        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on outside click
        document.getElementById('productModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
